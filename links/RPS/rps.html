<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="rps.css" />
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>

    <div class="choices">
      <button onclick="play(0)">✊ Rock</button>
      <button onclick="play(1)">✋ Paper</button>
      <button onclick="play(2)">✌ Scissor</button>
    </div>
    <div class="result">
      <p id="userChoice">You:</p>
      <p id="compChoice">Computer:</p>
      <h2 id="winner"></h2>
    </div>

    <div class="scoreBoard">
      <h3>Score Board</h3>
      <p>You: <span id="userScore">0</span></p>
      <p>Computer: <span id="compScore">0</span></p>
      <p>Draw: <span id="drawScore">0</span></p>
    </div>

    <script src="rps.js"></script>
  </body>
</html>
